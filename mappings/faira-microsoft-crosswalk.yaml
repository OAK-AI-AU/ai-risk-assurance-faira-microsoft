# Lifecycle Phase Mappings
lifecycle_mappings:
  - faira_phase: "Step 1: Team Formation and Planning"
    microsoft_phase: "Pre-Design"
    activities:
      - "Team competency assessment (NIST)"
      - "Security requirements definition"
      - "Threat modeling initiation"

  - faira_phase: "Step 2: Define AI Solution"
    microsoft_phase: "Design"
    activities:
      - "Architecture security review"
      - "Attack surface analysis"
      - "Data flow security mapping"

  - faira_phase: "Step 3: Values Assessment"
    microsoft_phase: "Design & Development"
    activities:
      - "Ethics review"
      - "Fairness testing plan"
      - "Privacy controls design"

  - faira_phase: "Step 4: Risk Assessment"
    microsoft_phase: "Design & Development"
    activities:
      - "Threat assessment using Microsoft matrix"
      - "Risk scoring"
      - "Control prioritization"

  - faira_phase: "Step 5: Controls Planning"
    microsoft_phase: "Development"
    activities:
      - "Security control implementation"
      - "Testing strategy definition"
      - "Monitoring design"

  - faira_phase: "Step 6: Documentation"
    microsoft_phase: "All Phases"
    activities:
      - "Control documentation"
      - "Compliance attestation"
      - "Audit trail establishment"

  - faira_phase: "Step 7: Lifecycle Maintenance"
    microsoft_phase: "Operations & Monitoring"
    activities:
      - "Continuous monitoring"
      - "Incident response"
      - "Regular re-assessment"

# Integration Notes
integration_recommendations:
  - recommendation: "Use FAIRA as primary governance framework for Queensland Government"
    rationale: "FAIRA is mandated and contextually appropriate"
    microsoft_role: "Provide detailed technical security controls"

  - recommendation: "Apply Microsoft threat taxonomy to FAIRA risk categories"
    rationale: "Microsoft provides comprehensive AI-specific threat coverage"
    implementation: "Map each FAIRA-identified risk to Microsoft threat types"

  - recommendation: "Integrate NIST competencies into FAIRA Step 1 team formation"
    rationale: "Ensures team has required AI security knowledge and skills"
    implementation: "Assess team against NF-COM-002 competency statements"

  - recommendation: "Use Microsoft lifecycle controls to elaborate FAIRA Part C"
    rationale: "Microsoft provides granular control guidance"
    implementation: "Reference Microsoft controls when defining FAIRA control plans"

  - recommendation: "Maintain FAIRA's WHS focus while adding Microsoft technical depth"
    rationale: "WHS unique to Australian context; Microsoft complements with security detail"
    implementation: "Preserve FAIRA WHS sections, enhance with Microsoft technical controls"
