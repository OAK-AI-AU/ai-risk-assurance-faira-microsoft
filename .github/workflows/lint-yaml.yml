name: Lint YAML Files

on:
  push:
    branches: [main]
    paths:
      - "mappings/**"
      - "api/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "mappings/**"
      - "api/**"
      - ".github/workflows/**"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install yamllint
        run: pip install yamllint

      - name: Create yamllint config
        run: |
          cat > .yamllint.yml << EOF
          extends: default
          rules:
            line-length:
              max: 120
              level: warning
            indentation:
              spaces: 2
              indent-sequences: consistent
            comments:
              min-spaces-from-content: 1
            document-start: disable
            truthy:
              allowed-values: ['true', 'false', 'yes', 'no']
          EOF

      - name: Lint YAML files
        run: |
          yamllint -c .yamllint.yml mappings/ api/ .github/workflows/ || true
          echo "YAML linting completed"

  validate-openapi:
    name: Validate OpenAPI Specification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install OpenAPI validator
        run: npm install -g @apidevtools/swagger-cli

      - name: Validate OpenAPI spec
        run: |
          if [ -f "api/openapi.yaml" ]; then
            echo "Validating OpenAPI specification..."
            swagger-cli validate api/openapi.yaml
            echo "✅ OpenAPI specification is valid"
          else
            echo "⚠️  No OpenAPI specification found"
          fi

  check-yaml-syntax:
    name: Check YAML Syntax
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: pip install PyYAML

      - name: Check YAML syntax
        run: |
          python << 'EOF'
          import yaml
          import sys
          from pathlib import Path

          errors = []
          yaml_files = list(Path('.').rglob('*.yaml')) + list(Path('.').rglob('*.yml'))

          for file in yaml_files:
              # Skip .git directory
              if '.git' in str(file):
                  continue

              try:
                  with open(file, 'r', encoding='utf-8') as f:
                      yaml.safe_load(f)
                  print(f"✅ {file}")
              except yaml.YAMLError as e:
                  print(f"❌ {file}: {e}")
                  errors.append(str(file))

          if errors:
              print(f"\n❌ {len(errors)} file(s) with YAML syntax errors")
              sys.exit(1)
          else:
              print(f"\n✅ All YAML files have valid syntax")
          EOF

  validate-mappings:
    name: Validate Framework Mappings
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install PyYAML jsonschema

      - name: Validate mapping files
        run: |
          python << 'EOF'
          import yaml
          import sys
          from pathlib import Path

          print("Validating framework mapping files...\n")

          # Check required mappings exist
          required_mappings = [
              'mappings/faira-microsoft-crosswalk.yaml',
              'mappings/risk-taxonomy.yaml',
              'mappings/naic-rai-index-2025.yaml'
          ]

          missing = []
          for mapping_file in required_mappings:
              if not Path(mapping_file).exists():
                  print(f"❌ Required mapping missing: {mapping_file}")
                  missing.append(mapping_file)
              else:
                  print(f"✅ Found: {mapping_file}")

          if missing:
              print(f"\n❌ {len(missing)} required mapping(s) missing")
              sys.exit(1)

          # Validate structure of mapping files
          mapping_files = Path('mappings').glob('*.yaml')

          for mapping_file in mapping_files:
              try:
                  with open(mapping_file, 'r', encoding='utf-8') as f:
                      data = yaml.safe_load(f)

                  if not isinstance(data, dict):
                      print(f"⚠️  {mapping_file}: Expected dictionary at root level")
                      continue

                  # Check for metadata
                  if 'metadata' in data:
                      print(f"✅ {mapping_file}: Has metadata")
                  else:
                      print(f"⚠️  {mapping_file}: No metadata found")

                  print(f"✅ {mapping_file}: Structure validated")

              except Exception as e:
                  print(f"❌ {mapping_file}: {e}")
                  sys.exit(1)

          print("\n✅ All mapping files validated")
          EOF

  summary:
    name: Generate Lint Summary
    runs-on: ubuntu-latest
    needs: [yamllint, validate-openapi, check-yaml-syntax, validate-mappings]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## YAML Lint Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Results" >> $GITHUB_STEP_SUMMARY
          echo "- YAML Lint: ${{ needs.yamllint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- OpenAPI Validation: ${{ needs.validate-openapi.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Syntax Check: ${{ needs.check-yaml-syntax.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Mappings Validation: ${{ needs.validate-mappings.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.yamllint.result }}" = "success" ] && \
             [ "${{ needs.validate-openapi.result }}" = "success" ] && \
             [ "${{ needs.check-yaml-syntax.result }}" = "success" ] && \
             [ "${{ needs.validate-mappings.result }}" = "success" ]; then
            echo "✅ All YAML validations passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some YAML validations failed" >> $GITHUB_STEP_SUMMARY
          fi
