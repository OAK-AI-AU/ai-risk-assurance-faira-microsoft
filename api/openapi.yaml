openapi: 3.0.3
info:
  title: AI Risk Assurance API
  version: 2.0.0
  description: |
    REST API for managing AI risk assessments using the Unified AI Risk Assurance Framework.

    This API integrates:
    - Queensland Government FAIRA Framework (v1.0.0)
    - Microsoft AI Security Risk Assessment (v4.1.4)
    - NIST AI Security Competency Area (NF-COM-002)
    - Voluntary AI Safety Standard (VAISS v1.0)
    - National Framework for AI Assurance in Government (NFAAIG 2024-2025)
    - Australian Responsible AI Index 2025

    **Authentication**: API key or OAuth 2.0 bearer token required for all endpoints.

    **Rate Limiting**: 1000 requests per hour per API key.

  contact:
    name: OAK AI
    url: https://github.com/OAK-AI-Public/ai-risk-assurance-faira-microsoft
  license:
    name: MIT
    url: https://github.com/OAK-AI-Public/ai-risk-assurance-faira-microsoft/blob/main/LICENSE

servers:
  - url: https://api.example.qld.gov.au/v2
    description: Production server
  - url: https://api-staging.example.qld.gov.au/v2
    description: Staging server
  - url: http://localhost:3000/v2
    description: Local development server

tags:
  - name: Risk Registers
    description: Manage AI risk registers
  - name: FAIRA Assessments
    description: FAIRA framework assessments
  - name: VAISS Assessments
    description: VAISS guardrail assessments
  - name: Compliance
    description: Compliance checking and gap analysis
  - name: Validation
    description: Schema validation services
  - name: Frameworks
    description: Framework metadata and mappings

security:
  - ApiKeyAuth: []
  - BearerAuth: []

paths:
  /risk-registers:
    get:
      tags: [Risk Registers]
      summary: List all risk registers
      description: Retrieve a paginated list of risk registers
      operationId: listRiskRegisters
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: projectName
          in: query
          description: Filter by project name
          schema:
            type: string
        - name: status
          in: query
          description: Filter by risk status
          schema:
            type: string
            enum: [Identified, Assessed, Mitigation Planned, Mitigation In Progress, Mitigated, Accepted, Closed]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RiskRegisterSummary'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    post:
      tags: [Risk Registers]
      summary: Create a new risk register
      description: Create a new AI risk assessment register
      operationId: createRiskRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RiskRegister'
      responses:
        '201':
          description: Risk register created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiskRegister'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /risk-registers/{registerId}:
    get:
      tags: [Risk Registers]
      summary: Get a specific risk register
      description: Retrieve a risk register by ID
      operationId: getRiskRegister
      parameters:
        - name: registerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiskRegister'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    put:
      tags: [Risk Registers]
      summary: Update a risk register
      description: Update an existing risk register
      operationId: updateRiskRegister
      parameters:
        - name: registerId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RiskRegister'
      responses:
        '200':
          description: Risk register updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiskRegister'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'

    delete:
      tags: [Risk Registers]
      summary: Delete a risk register
      description: Delete a risk register by ID
      operationId: deleteRiskRegister
      parameters:
        - name: registerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Risk register deleted successfully
        '404':
          $ref: '#/components/responses/NotFoundError'

  /risk-registers/{registerId}/risks:
    post:
      tags: [Risk Registers]
      summary: Add a risk to register
      description: Add a new risk entry to an existing risk register
      operationId: addRisk
      parameters:
        - name: registerId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Risk'
      responses:
        '201':
          description: Risk added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Risk'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /risk-registers/{registerId}/risks/{riskId}:
    put:
      tags: [Risk Registers]
      summary: Update a risk
      description: Update a specific risk entry
      operationId: updateRisk
      parameters:
        - name: registerId
          in: path
          required: true
          schema:
            type: string
        - name: riskId
          in: path
          required: true
          schema:
            type: string
            pattern: '^RISK-\d{4}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Risk'
      responses:
        '200':
          description: Risk updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Risk'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /faira-assessments:
    get:
      tags: [FAIRA Assessments]
      summary: List FAIRA assessments
      description: Retrieve a paginated list of FAIRA assessments
      operationId: listFairaAssessments
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/FairaAssessmentSummary'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

    post:
      tags: [FAIRA Assessments]
      summary: Create FAIRA assessment
      description: Create a new FAIRA framework assessment
      operationId: createFairaAssessment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FairaAssessment'
      responses:
        '201':
          description: Assessment created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FairaAssessment'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /faira-assessments/{assessmentId}:
    get:
      tags: [FAIRA Assessments]
      summary: Get FAIRA assessment
      description: Retrieve a specific FAIRA assessment
      operationId: getFairaAssessment
      parameters:
        - name: assessmentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FairaAssessment'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /vaiss-assessments:
    get:
      tags: [VAISS Assessments]
      summary: List VAISS assessments
      description: Retrieve a paginated list of VAISS guardrail assessments
      operationId: listVaissAssessments
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/VaissAssessmentSummary'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

    post:
      tags: [VAISS Assessments]
      summary: Create VAISS assessment
      description: Create a new VAISS guardrail assessment
      operationId: createVaissAssessment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VaissAssessment'
      responses:
        '201':
          description: Assessment created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaissAssessment'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /compliance/check:
    post:
      tags: [Compliance]
      summary: Run compliance check
      description: Check compliance against selected frameworks
      operationId: checkCompliance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [assessmentId, frameworks]
              properties:
                assessmentId:
                  type: string
                  description: ID of the risk register or assessment
                frameworks:
                  type: array
                  items:
                    type: string
                    enum: [FAIRA, Microsoft, NIST, VAISS, NFAAIG, ISO42001]
                  description: Frameworks to check compliance against
      responses:
        '200':
          description: Compliance check completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceReport'
        '400':
          $ref: '#/components/responses/BadRequestError'

  /compliance/gaps:
    post:
      tags: [Compliance]
      summary: Identify compliance gaps
      description: Identify gaps between current state and framework requirements
      operationId: identifyGaps
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [assessmentId, targetFramework]
              properties:
                assessmentId:
                  type: string
                targetFramework:
                  type: string
                  enum: [FAIRA, Microsoft, NIST, VAISS, NFAAIG, ISO42001]
      responses:
        '200':
          description: Gap analysis completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GapAnalysisReport'

  /validate/risk-register:
    post:
      tags: [Validation]
      summary: Validate risk register
      description: Validate a risk register against the JSON schema
      operationId: validateRiskRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RiskRegister'
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResult'

  /validate/faira-assessment:
    post:
      tags: [Validation]
      summary: Validate FAIRA assessment
      description: Validate a FAIRA assessment against the JSON schema
      operationId: validateFairaAssessment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FairaAssessment'
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResult'

  /frameworks:
    get:
      tags: [Frameworks]
      summary: List frameworks
      description: Get metadata about all supported frameworks
      operationId: listFrameworks
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FrameworkMetadata'

  /frameworks/{frameworkId}/mappings:
    get:
      tags: [Frameworks]
      summary: Get framework mappings
      description: Retrieve cross-framework mappings for a specific framework
      operationId: getFrameworkMappings
      parameters:
        - name: frameworkId
          in: path
          required: true
          schema:
            type: string
            enum: [faira, microsoft, nist, vaiss, nfaaig, iso42001]
        - name: targetFramework
          in: query
          description: Target framework for mapping
          schema:
            type: string
            enum: [faira, microsoft, nist, vaiss, nfaaig, iso42001]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FrameworkMapping'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RiskRegister:
      type: object
      description: Complete AI risk register (references risk-register.schema.json)
      properties:
        metadata:
          type: object
          properties:
            version:
              type: string
            assessmentId:
              type: string
            projectName:
              type: string
            assessor:
              type: object
              properties:
                name:
                  type: string
                role:
                  type: string
                organisation:
                  type: string
                email:
                  type: string
                  format: email
        risks:
          type: array
          items:
            $ref: '#/components/schemas/Risk'

    RiskRegisterSummary:
      type: object
      properties:
        assessmentId:
          type: string
        projectName:
          type: string
        createdDate:
          type: string
          format: date
        lastUpdated:
          type: string
          format: date-time
        totalRisks:
          type: integer
        highPriorityRisks:
          type: integer

    Risk:
      type: object
      required: [riskId, title, category, severity, likelihood]
      properties:
        riskId:
          type: string
          pattern: '^RISK-\d{4}$'
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [Technical, Security, Ethical, Operational, WHS, Privacy, Bias, Safety, Transparency, Accountability, Legal/Compliance, Reputational]
        severity:
          type: integer
          minimum: 1
          maximum: 5
        likelihood:
          type: integer
          minimum: 1
          maximum: 5
        riskScore:
          type: integer
        status:
          type: string
          enum: [Identified, Assessed, Mitigation Planned, Mitigation In Progress, Mitigated, Accepted, Closed]

    FairaAssessment:
      type: object
      description: FAIRA framework assessment (references faira-assessment.schema.json)
      properties:
        metadata:
          type: object
        partA:
          type: object
          description: Components Analysis
        partB:
          type: object
          description: Values Assessment
        partC:
          type: object
          description: Controls for AI Risks

    FairaAssessmentSummary:
      type: object
      properties:
        assessmentId:
          type: string
        projectName:
          type: string
        organisation:
          type: string
        createdDate:
          type: string
          format: date

    VaissAssessment:
      type: object
      description: VAISS guardrail assessment (references vaiss-guardrails.schema.json)
      properties:
        metadata:
          type: object
        guardrailAssessments:
          type: array
          items:
            type: object
        overallAssessment:
          type: object

    VaissAssessmentSummary:
      type: object
      properties:
        organisation:
          type: string
        aiSystemName:
          type: string
        assessmentDate:
          type: string
          format: date
        maturityScore:
          type: number

    ComplianceReport:
      type: object
      properties:
        assessmentId:
          type: string
        frameworks:
          type: array
          items:
            type: object
            properties:
              framework:
                type: string
              compliant:
                type: boolean
              compliancePercentage:
                type: number
              gaps:
                type: array
                items:
                  type: string
        generatedAt:
          type: string
          format: date-time

    GapAnalysisReport:
      type: object
      properties:
        assessmentId:
          type: string
        targetFramework:
          type: string
        gaps:
          type: array
          items:
            type: object
            properties:
              requirement:
                type: string
              severity:
                type: string
                enum: [Low, Medium, High, Critical]
              recommendation:
                type: string
        coveragePercentage:
          type: number

    ValidationResult:
      type: object
      properties:
        valid:
          type: boolean
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
              code:
                type: string

    FrameworkMetadata:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        version:
          type: string
        description:
          type: string
        publisher:
          type: string
        releaseDate:
          type: string
          format: date

    FrameworkMapping:
      type: object
      properties:
        sourceFramework:
          type: string
        targetFramework:
          type: string
        mappings:
          type: array
          items:
            type: object
            properties:
              sourceRequirement:
                type: string
              targetRequirements:
                type: array
                items:
                  type: string
              alignmentStrength:
                type: string
                enum: [Full, Partial, Related, None]

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object

  responses:
    BadRequestError:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    UnauthorizedError:
      description: Unauthorized - invalid or missing API key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
